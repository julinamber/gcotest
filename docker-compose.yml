services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gco_app
    ports:
      - "3000:3000"
    # Serve your latest HTML/JS/CSS from this folder (otherwise the image only has files from last `docker compose build`).
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: gco_mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: gco_appointments
      MYSQL_USER: gco_user
      MYSQL_PASSWORD: gco_password
    ports:
      - "3307:3306"
    volumes:
      - gco_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: gco_adminer
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gco_mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

volumes:
  gco_mysql_data:
